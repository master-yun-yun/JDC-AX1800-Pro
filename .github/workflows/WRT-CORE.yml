#云编译公用核心
name: WRT-CORE

on:
  workflow_call:
    inputs:
      WRT_TARGET:
        required: true
        type: string
      WRT_THEME:
        required: true
        type: string
      WRT_NAME:
        required: true
        type: string
      WRT_SSID:
        required: true
        type: string
      WRT_WORD:
        required: true
        type: string
      WRT_IP:
        required: true
        type: string
      WRT_PW:
        required: true
        type: string
      WRT_REPO:
        required: true
        type: string
      WRT_BRANCH:
        required: true
        type: string
      WRT_SOURCE:
        required: false
        type: string
      WRT_PACKAGE:
        required: false
        type: string
      WRT_TEST:
        required: false
        type: string

env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  WRT_TARGET: ${{inputs.WRT_TARGET}}
  WRT_THEME: ${{inputs.WRT_THEME}}
  WRT_NAME: ${{inputs.WRT_NAME}}
  WRT_SSID: ${{inputs.WRT_SSID}}
  WRT_WORD: ${{inputs.WRT_WORD}}
  WRT_IP: ${{inputs.WRT_IP}}
  WRT_PW: ${{inputs.WRT_PW}}
  WRT_REPO: ${{inputs.WRT_REPO}}
  WRT_BRANCH: ${{inputs.WRT_BRANCH}}
  WRT_PACKAGE: ${{inputs.WRT_PACKAGE}}
  WRT_TEST: ${{inputs.WRT_TEST}}

jobs:
  core:
    name: ${{inputs.WRT_SOURCE}}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Projects
        uses: actions/checkout@main

      # 第一阶段：磁盘空间管理
      - name: Free Disk Space
        uses: FirelightFlagboy/gh-runner-free-disk-space@main
        with:
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          large-packages: true
          swap-storage: true
          tool-cache: true

      - name: Check disk space before cleanup
        run: df -h

      - name: Remove Google Cloud components
        run: |
          if dpkg -l | grep -q 'google-cloud-cli-anthoscli'; then
            echo "Removing google-cloud-cli-anthoscli..."
            sudo apt-get remove --autoremove -y google-cloud-cli-anthoscli || echo "::warning::Failed to remove Anthos CLI"
          fi

      - name: Clean residual packages
        run: |
          pkgs=$(dpkg -l | awk '/^rc/ {print $2}')
          if [ -n "$pkgs" ]; then
            echo "Purging residual packages: $pkgs"
            sudo dpkg --purge $pkgs
          fi

      - name: Final cleanup
        run: |
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          df -h

      # 第二阶段：环境准备
      - name: Add Swap
        run: |
          sudo dd if=/dev/zero of=/swapfile bs=1G count=4
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h
          sudo swapon --show

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt -yqq update
          sudo -E apt -yqq full-upgrade
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E systemctl daemon-reload
          sudo -E timedatectl set-timezone "Asia/Shanghai"

      # 第三阶段：编译配置
      - name: Initialization Values
        run: |
          export WRT_DATE=$(TZ=UTC-8 date +"%y.%m.%d_%H.%M.%S")
          export WRT_CI=$(basename $GITHUB_WORKSPACE)
          export WRT_VER=$(echo $WRT_REPO | cut -d '/' -f 5-)-$WRT_BRANCH
          export WRT_TYPE=$(sed -n "1{s/^#//;s/\r$//;p;q}" $GITHUB_WORKSPACE/Config/$WRT_TARGET.txt)

          echo "WRT_DATE=$WRT_DATE" >> $GITHUB_ENV
          echo "WRT_CI=$WRT_CI" >> $GITHUB_ENV
          echo "WRT_VER=$WRT_VER" >> $GITHUB_ENV
          echo "WRT_TYPE=$WRT_TYPE" >> $GITHUB_ENV

      - name: Clone Code
        run: |
          git clone --depth=1 --single-branch --branch $WRT_BRANCH $WRT_REPO ./wrt/
          cd ./wrt/ && echo "WRT_HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV

          # 移除国内镜像源
          PROJECT_MIRRORS_FILE="./scripts/projectsmirrors.json"
          [ -f "$PROJECT_MIRRORS_FILE" ] && sed -i '/.cn\//d; /tencent/d; /aliyun/d' "$PROJECT_MIRRORS_FILE"

	  - name: Check Scripts
		run: |
		  set -eo pipefail  # 启用错误检测
    
          if ! find_cmd=$(find ./ -maxdepth 3 -type f $ -iname "*.txt" -o -iname "*.sh" $ 2>&1); then
          echo "::error::文件查找失败: $find_cmd"
          exit 1
          fi
    
          echo "$find_cmd" | while read -r file; do
          if [ ! -f "$file" ]; then
          echo "::warning::无效文件路径: $file"
          continue
          fi
          dos2unix "$file"
          chmod +x "$file"
          done


      # 第四阶段：缓存管理（续）
      - name: Check Caches
        id: check-cache
        if: env.WRT_TEST != 'true'
        uses: actions/cache@main
        with:
          key: ${{env.WRT_TARGET}}-${{env.WRT_VER}}-${{env.WRT_HASH}}
          restore-keys: ${{env.WRT_TARGET}}-${{env.WRT_VER}}
          path: |
            ./wrt/.ccache
            ./wrt/staging_dir/host*
            ./wrt/staging_dir/tool*

      - name: Update Caches
        if: env.WRT_TEST != 'true'
        run: |
          if [ -d "./wrt/staging_dir" ]; then
            find "./wrt/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r DIR; do
              find "$DIR" -type f -exec touch {} +
            done

            mkdir -p ./wrt/tmp && echo "1" > ./wrt/tmp/.build
            echo "Toolchain timestamp updated!"
          else
            echo "No existing caches found!"
          fi

          if [[ "${{steps.check-cache.outputs.cache-hit}}" != 'true' ]]; then
            echo "Cleaning old caches..."
            CACHE_LIST=$(gh cache list --key "$WRT_TARGET-$WRT_VER" | cut -f 1)
            for CACHE_KEY in $CACHE_LIST; do
              gh cache delete $CACHE_KEY --confirm
            done
          fi

      # 第五阶段：编译准备
      - name: Update Feeds
        run: |
          cd ./wrt/
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Custom Packages
        run: |
          cd ./wrt/package/
          $GITHUB_WORKSPACE/Scripts/Packages.sh
          $GITHUB_WORKSPACE/Scripts/Handles.sh

      - name: Custom Settings
        run: |
          cd ./wrt/
          cat $GITHUB_WORKSPACE/Config/$WRT_TARGET.txt $GITHUB_WORKSPACE/Config/GENERAL.txt >> .config
          $GITHUB_WORKSPACE/Scripts/Settings.sh
          make defconfig -j$(nproc)
          make clean

      - name: Download Packages
        if: env.WRT_TEST != 'true'
        run: |
          cd ./wrt/
          make download -j$(nproc)

      # 第六阶段：编译过程
      - name: Compile Firmware
        if: env.WRT_TEST != 'true'
        run: |
          cd ./wrt/
          make -j2 V=s || { echo "::error::Compilation failed"; exit 1; }

      - name: Machine Information
        run: |
          echo "======================="
          lscpu | grep -E "name|Core|Thread"
          echo "======================="
          df -h
          echo "======================="
          du -h --max-depth=1
          echo "======================="

      # 第七阶段：成果处理
      - name: Package Firmware
        run: |
          cd ./wrt/
          mkdir -p upload
          cp -f .config "upload/Config_${WRT_TARGET}_${WRT_VER}_${WRT_DATE}.txt"

          if [[ $WRT_TEST != 'true' ]]; then
            KVER=$(find ./bin/targets/ -name "*.manifest" -exec grep -m1 -oP 'kernel - \K[\d.]+' {} \;)
            
            # 清理不需要的文件
            find ./bin/targets/ $ -iname "*.buildinfo" -o -iname "*.json" -o -iname "*.manifest" $ -delete
            
            # 处理固件文件
            while IFS= read -r -d '' FILE; do
              FILENAME=$(basename "$FILE")
              EXTENSION="${FILENAME#*.}"
              NEW_NAME="${WRT_VER}_${WRT_DATE}.${EXTENSION}"
              mv -f "$FILE" "upload/$NEW_NAME"
            done < <(find ./bin/targets/ -type f -print0)

            echo "WRT_KVER=${KVER:-none}" >> $GITHUB_ENV
          fi

      # 最终阶段：发布清理
      - name: Release Firmware
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{env.WRT_TARGET}}_${{env.WRT_VER}}_${{env.WRT_DATE}}
          files: ./wrt/upload/*
          body: |
            📦 固件编译报告
            
            ### 基本配置
            - 编译时间：`${{env.WRT_DATE}}`
            - 内核版本：`${{env.WRT_KVER}}`
            - 目标平台：`${{env.WRT_TARGET}}`
            
            ### 网络配置
            - WiFi SSID：`${{env.WRT_SSID}}`
            - WiFi 密码：`${{env.WRT_WORD}}`
            - 管理地址：`http://${{env.WRT_IP}}`
            - 管理密码：`${{env.WRT_PW}}`

            ### 源码信息
            - 代码仓库：[${{env.WRT_REPO}}](${{env.WRT_REPO}})
            - 代码分支：`${{env.WRT_BRANCH}}`
            - 最后提交：`${{env.WRT_HASH}}`

      - name: Cleanup Swap
        run: |
          sudo swapoff /swapfile
          sudo rm -f /swapfile
          echo "Swap space removed successfully"
          df -h
